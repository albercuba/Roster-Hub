{% extends 'base.html' %}
{% block content %}
<section class="panel">
    <h1>{{ t('m365.title') }}</h1>
    <p class="muted">{{ t('m365.summary') }}</p>
    <form action="/admin/settings/microsoft-365" method="post" class="grid-form two">
        <label class="checkbox-row full-span"><input type="checkbox" name="microsoft_enabled" value="true" {% if settings_record and settings_record.microsoft_enabled %}checked{% endif %}/> {{ t('m365.enabled') }}</label>
        <label>{{ t('m365.tenant_id') }}<input type="text" name="microsoft_tenant_id" value="{{ settings_record.microsoft_tenant_id if settings_record else '' }}" /></label>
        <label>{{ t('m365.client_id') }}<input type="text" name="microsoft_client_id" value="{{ settings_record.microsoft_client_id if settings_record else '' }}" /></label>
        <label>{{ t('m365.client_secret') }}<input type="password" name="microsoft_client_secret" placeholder="{% if settings_record and settings_record.microsoft_client_secret %}{{ t('m365.client_secret_placeholder_saved') }}{% else %}{{ t('m365.client_secret_placeholder_new') }}{% endif %}" autocomplete="new-password" /></label>
        <label>{{ t('m365.audience') }}<input type="text" name="microsoft_audience" value="{{ settings_record.microsoft_audience if settings_record else '' }}" /></label>
        <label>{{ t('m365.authority') }}<input type="text" name="microsoft_authority" value="{{ settings_record.microsoft_authority if settings_record else '' }}" placeholder="https://login.microsoftonline.com/{tenant}" /></label>
        <div class="full-span divider-top">
            <h2>{{ t('m365.role_mapping_title') }}</h2>
            <p class="muted">{{ t('m365.role_mapping_summary') }}</p>
        </div>
        <label>{{ t('m365.admin_group_name') }}<input type="text" name="microsoft_admin_group_name" value="{{ settings_record.microsoft_admin_group_name if settings_record else '' }}" /></label>
        <label>{{ t('m365.admin_group_id') }}<input type="text" name="microsoft_admin_group_id" value="{{ settings_record.microsoft_admin_group_id if settings_record else '' }}" /></label>
        <label>{{ t('m365.user_group_name') }}<input type="text" name="microsoft_user_group_name" value="{{ settings_record.microsoft_user_group_name if settings_record else '' }}" /></label>
        <label>{{ t('m365.user_group_id') }}<input type="text" name="microsoft_user_group_id" value="{{ settings_record.microsoft_user_group_id if settings_record else '' }}" /></label>
        <div class="form-actions full-span"><button class="button" type="submit">{{ t('common.save') }}</button></div>
    </form>
</section>
{% endblock %}
